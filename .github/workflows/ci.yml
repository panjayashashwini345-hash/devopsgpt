name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run --no-sync ruff check src tests

      - name: Type check (mypy)
        run: uv run --no-sync mypy src

      - name: Test (pytest)
        run: uv run --no-sync pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Build image
        run: docker build -t devopsgpt:ci .
      - name: Smoke test (offline investigation in container)
        run: |
          docker run --rm devopsgpt:ci \
            python -m devopsgpt investigate "Checkout API is slow" --quiet
