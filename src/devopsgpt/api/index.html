<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DevOpsGPT — Autonomous Incident Investigator</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3;
    --muted: #8b949e; --accent: #2f81f7; --green: #3fb950; --red: #f85149;
    --amber: #d29922; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: var(--panel);
  }
  header h1 { font-size: 18px; margin: 0; }
  header .badge {
    font-size: 11px; color: var(--muted); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 999px;
  }
  main { max-width: 960px; margin: 0 auto; padding: 24px; }
  .ask {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .ask input {
    flex: 1; padding: 12px 14px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    font-size: 15px;
  }
  .ask button {
    padding: 12px 20px; background: var(--accent); color: white; border: none;
    border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600;
  }
  .ask button:disabled { opacity: .5; cursor: default; }
  .ask input:focus-visible, .ask button:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  .examples { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .examples button {
    font-size: 13px; color: var(--accent); cursor: pointer; font-family: inherit;
    background: transparent; border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 999px;
  }
  .examples button:hover, .examples button:focus-visible { border-color: var(--accent); }
  .steps { display: flex; flex-direction: column; gap: 8px; }
  .step {
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px;
    background: var(--panel); font-size: 14px; animation: fade .25s ease;
  }
  @keyframes fade { from { opacity: 0; transform: translateY(4px);} to {opacity:1;} }
  .step .tag {
    font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted); margin-right: 8px;
  }
  .step.tool_call { border-left: 3px solid var(--accent); }
  .step.tool_result { border-left: 3px solid var(--green); }
  .step.thought { border-left: 3px solid var(--muted); }
  .step.error { border-left: 3px solid var(--red); }
  .step code { font-family: var(--mono); font-size: 12.5px; color: #a5d6ff; }
  .report {
    margin-top: 24px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--panel); padding: 20px; display: none;
  }
  .report.show { display: block; }
  .report h2 { margin-top: 0; }
  .report .meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .report .meta div { font-size: 13px; color: var(--muted); }
  .report .meta b { color: var(--text); }
  .sev { padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 12px; }
  .sev.critical, .sev.high { background: rgba(248,81,73,.15); color: var(--red); }
  .sev.medium { background: rgba(210,153,34,.15); color: var(--amber); }
  .sev.low, .sev.info { background: rgba(63,185,80,.15); color: var(--green); }
  .report pre {
    background: #0d1117; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px;
  }
  .report .md { white-space: pre-wrap; }
  .links { display: flex; gap: 12px; margin-top: 16px; }
  .links a {
    color: var(--accent); text-decoration: none; border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 8px; font-size: 14px;
  }
  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .step { animation: none; }
    .spinner { animation: none; }
    * { scroll-behavior: auto; }
  }
</style>
</head>
<body>
<header>
  <h1>🛠️ DevOpsGPT</h1>
  <span class="badge" id="cfg">loading config…</span>
</header>
<main>
  <div class="ask">
    <input id="q" aria-label="Describe the incident or problem to investigate"
           placeholder="Describe the problem, e.g. 'Checkout API is slow'" />
    <button id="go">Investigate</button>
  </div>
  <div class="examples">
    <button type="button">Checkout API is slow</button>
    <button type="button">We're seeing 503s on /api/checkout</button>
    <button type="button">Latency spiked after the last deploy</button>
  </div>

  <div class="steps" id="steps" aria-live="polite"></div>

  <div class="report" id="report">
    <h2>Incident Report</h2>
    <div class="meta" id="meta"></div>
    <div class="md" id="rootcause"></div>
    <div class="links" id="links"></div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const stepsEl = $("steps"), reportEl = $("report");

fetch("/config").then(r => r.json()).then(c => {
  $("cfg").textContent =
    `LLM: ${c.llm_provider} · Splunk: ${c.splunk_backend} · Jira: ${c.jira_mode} · GitHub: ${c.github_mode}`;
}).catch(() => { $("cfg").textContent = "config unavailable"; });

document.querySelectorAll(".examples button").forEach(s => {
  s.onclick = () => { $("q").value = s.textContent; investigate(); };
});
$("go").onclick = investigate;
$("q").addEventListener("keydown", (e) => { if (e.key === "Enter") investigate(); });

function addStep(step) {
  const div = document.createElement("div");
  div.className = "step " + step.type;
  let inner = `<span class="tag">${step.type}</span>`;
  if (step.type === "tool_call" || step.type === "tool_result") {
    inner += `<code>${escapeHtml(step.summary)}</code>`;
  } else {
    inner += escapeHtml(step.summary);
  }
  div.innerHTML = inner;
  stepsEl.appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function investigate() {
  const question = $("q").value.trim();
  if (!question) return;
  stepsEl.innerHTML = "";
  reportEl.classList.remove("show");
  $("go").disabled = true;
  $("go").innerHTML = '<span class="spinner"></span>';

  // POST + read the SSE stream from the response body.
  const resp = await fetch("/investigate/stream", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ question }),
  });
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const chunks = buffer.split("\n\n");
    buffer = chunks.pop();
    for (const chunk of chunks) handleEvent(chunk);
  }
  $("go").disabled = false;
  $("go").textContent = "Investigate";
}

function handleEvent(chunk) {
  let event = "message", data = "";
  for (const line of chunk.split("\n")) {
    if (line.startsWith("event:")) event = line.slice(6).trim();
    else if (line.startsWith("data:")) data += line.slice(5).trim();
  }
  if (!data) return;
  if (event === "step") addStep(JSON.parse(data));
  else if (event === "report") renderReport(JSON.parse(data));
}

function renderReport(r) {
  // Severity drives a CSS class — whitelist it so a hostile value can't inject
  // markup or arbitrary class names.
  const SEVERITIES = ["critical", "high", "medium", "low", "info"];
  const sev = SEVERITIES.includes(r.severity) ? r.severity : "info";
  // Every dynamic value is escaped before reaching innerHTML.
  $("meta").innerHTML = `
    <div>Severity <span class="sev ${sev}">${escapeHtml(r.severity)}</span></div>
    <div>Confidence <b>${Math.round((r.confidence||0)*100)}%</b></div>
    <div>LLM <b>${escapeHtml(r.llm_provider)}</b></div>
    <div>Splunk <b>${escapeHtml(r.splunk_backend)}</b></div>
    <div>Elapsed <b>${(r.elapsed_s||0).toFixed(1)}s</b></div>`;
  let md = `<h3>Root cause</h3>${escapeHtml(r.root_cause || r.summary)}`;
  if (r.suggested_fix) md += `<h3>Suggested fix</h3>${escapeHtml(r.suggested_fix)}`;
  if (r.proposed_diff) md += `<h3>Proposed diff</h3><pre>${escapeHtml(r.proposed_diff)}</pre>`;
  $("rootcause").innerHTML = md;

  // Ticket/PR fields come from external systems (Jira/GitHub) — escape the text
  // and only allow http(s) hrefs so a crafted url can't run script.
  const links = [];
  if (r.jira_ticket && r.jira_ticket.url)
    links.push(linkHtml(r.jira_ticket.url, `🎫 ${r.jira_ticket.key || "ticket"}${r.jira_ticket.mocked ? " (mock)" : ""}`));
  if (r.pull_request && r.pull_request.url)
    links.push(linkHtml(r.pull_request.url, `🔀 PR #${r.pull_request.number}${r.pull_request.mocked ? " (mock)" : ""}`));
  $("links").innerHTML = links.join("");
  reportEl.classList.add("show");
  reportEl.scrollIntoView({ behavior: "smooth", block: "start" });
}

function safeUrl(url) {
  // Only permit http/https; anything else (javascript:, data:, …) -> "#".
  try {
    const u = new URL(url, window.location.origin);
    return (u.protocol === "http:" || u.protocol === "https:") ? u.href : "#";
  } catch {
    return "#";
  }
}

function linkHtml(url, label) {
  return `<a href="${escapeHtml(safeUrl(url))}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`;
}

</script>
</body>
</html>
